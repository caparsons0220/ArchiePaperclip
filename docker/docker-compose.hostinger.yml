services:
  archie-db:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${ARCHIE_DB_NAME:-paperclip}
      POSTGRES_USER: ${ARCHIE_DB_USER:-paperclip}
      POSTGRES_PASSWORD: ${ARCHIE_DB_PASSWORD:?ARCHIE_DB_PASSWORD must be set}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${ARCHIE_DB_USER:-paperclip} -d ${ARCHIE_DB_NAME:-paperclip}"]
      interval: 5s
      timeout: 5s
      retries: 30
    volumes:
      - archie-pgdata:/var/lib/postgresql/data

  archie-app:
    image: ${ARCHIE_APP_IMAGE:-archie-bravo:hostinger}
    build:
      context: ..
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      archie-db:
        condition: service_healthy
    expose:
      - "3100"
    environment:
      HOST: "0.0.0.0"
      PORT: "3100"
      SERVE_UI: "true"
      DATABASE_URL: postgres://${ARCHIE_DB_USER:-paperclip}:${ARCHIE_DB_PASSWORD}@archie-db:5432/${ARCHIE_DB_NAME:-paperclip}
      PAPERCLIP_HOME: "/paperclip"
      PAPERCLIP_DEPLOYMENT_MODE: ${PAPERCLIP_DEPLOYMENT_MODE:-authenticated}
      PAPERCLIP_DEPLOYMENT_EXPOSURE: ${PAPERCLIP_DEPLOYMENT_EXPOSURE:-public}
      PAPERCLIP_PUBLIC_URL: ${PAPERCLIP_PUBLIC_URL:?PAPERCLIP_PUBLIC_URL must be set}
      BETTER_AUTH_SECRET: ${BETTER_AUTH_SECRET:?BETTER_AUTH_SECRET must be set}
      PAPERCLIP_AUTH_DISABLE_SIGN_UP: ${PAPERCLIP_AUTH_DISABLE_SIGN_UP:-false}
      PAPERCLIP_ALLOWED_HOSTNAMES: ${PAPERCLIP_ALLOWED_HOSTNAMES:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
    labels:
      traefik.enable: "true"
      traefik.http.routers.archie.rule: Host(`${ARCHIE_HOSTNAME:?ARCHIE_HOSTNAME must be set}`)
      traefik.http.routers.archie.entrypoints: websecure
      traefik.http.routers.archie.tls: "true"
      traefik.http.routers.archie.tls.certresolver: ${TRAEFIK_CERT_RESOLVER:-letsencrypt}
      traefik.http.services.archie.loadbalancer.server.port: "3100"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:3100/api/health > /dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 30s
    volumes:
      - archie-paperclip-data:/paperclip

volumes:
  archie-pgdata:
  archie-paperclip-data:
