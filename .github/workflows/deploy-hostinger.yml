name: Deploy Hostinger

on:
  # Manual fallback only. Normal production auto-deploy is owned by Hostinger
  # Docker Manager watching the production branch.
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy to Hostinger
        uses: hostinger/deploy-on-vps@v2
        with:
          api-key: ${{ secrets.HOSTINGER_API_KEY }}
          virtual-machine: ${{ vars.HOSTINGER_VM_ID }}
          project-name: ${{ vars.HOSTINGER_PROJECT_NAME || 'archie-bravo' }}
          docker-compose-path: docker/docker-compose.hostinger.yml
          environment-variables: |
            PAPERCLIP_PUBLIC_URL=${{ vars.PAPERCLIP_PUBLIC_URL }}
            ARCHIE_HOSTNAME=${{ vars.ARCHIE_HOSTNAME }}
            TRAEFIK_CERT_RESOLVER=${{ vars.TRAEFIK_CERT_RESOLVER || 'letsencrypt' }}
            PAPERCLIP_DEPLOYMENT_MODE=authenticated
            PAPERCLIP_DEPLOYMENT_EXPOSURE=public
            BETTER_AUTH_SECRET=${{ secrets.BETTER_AUTH_SECRET }}
            DATABASE_URL=${{ secrets.DATABASE_URL }}
            DATABASE_MIGRATION_URL=${{ secrets.DATABASE_MIGRATION_URL }}
            PAPERCLIP_AUTH_DISABLE_SIGN_UP=${{ vars.PAPERCLIP_AUTH_DISABLE_SIGN_UP || 'false' }}
            PAPERCLIP_DB_BACKUP_ENABLED=${{ vars.PAPERCLIP_DB_BACKUP_ENABLED || 'false' }}
            PAPERCLIP_ALLOWED_HOSTNAMES=${{ vars.PAPERCLIP_ALLOWED_HOSTNAMES }}
            OPENAI_API_KEY=${{ secrets.OPENAI_API_KEY }}
            ANTHROPIC_API_KEY=${{ secrets.ANTHROPIC_API_KEY }}
            GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}
